version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
      - ./data:/app/data
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
